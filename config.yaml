## 风险管理配置

```
risk:
  # 持仓限制
  max_position: 100           # 单品种最大持仓
  total_position: 200         # 总持仓限制
  consecutive_loss: 5         # 连续亏损限制
  
  # 价格限制
  max_price_change: 0.2       # 最大涨跌幅限制 20%
  max_volatility: 3.0         # 最大波动率 3σ
  price_filter: 0.05          # 异常价格过滤 ±5%
  
  # 时间限制
  trading_window_start: "09:00"
  trading_window_end: "15:00"
  cancel_window_start: "09:00"
  cancel_window_end: "15:00"
  close_before_close: "14:55"
  
  # 风险参数
  max_daily_loss: 10000       # 最大日亏损（元）
  max_drawdown: 0.1           # 最大回撤 10%
  max_risk_per_trade: 0.02    # 单笔交易最大风险 2%
  max_total_exposure: 2.0     # 总风险暴露 2 倍
  
  # 止损止盈
  stop_loss_type: "ATR"       # ATR / fixed_price
  stop_loss_multiplier: 2.0   # ATR 倍数
  take_profit_type: "ATR"
  take_profit_multiplier: 3.0
  
  # 仓位管理
  position_size_type: "fixed" # fixed / risk
  position_size_value: 100000 # 固定仓位价值
  risk_ratio: 0.01            # 风险仓位比例
  
  # 资金管理
  cash_reserve_ratio: 0.2     # 现金储备比例
  max_leverage: 2.0           # 最大杠杆
```

