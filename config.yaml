## 环境变量说明

以下配置项应从 `.env` 文件加载：

```
# CTP 接口
CTP_PASSWORD=your_password
CTP_BROKERID=9999
CTP_USERID=your_userid
CTP_APPID=your_appid
CTP_AUTHCODE=your_authcode

# 邮件
EMAIL_USERNAME=your_email
EMAIL_PASSWORD=your_password
EMAIL_SENDER=sender@example.com
EMAIL_RECEIVER_1=receiver1@example.com
EMAIL_RECEIVER_2=receiver2@example.com
```

---

## 使用说明

### 1. 创建 `.env` 文件

在项目根目录创建 `.env` 文件，填入敏感信息：

```bash
# .env
CTP_PASSWORD=your_password
CTP_BROKERID=9999
CTP_USERID=your_userid
CTP_APPID=your_appid
CTP_AUTHCODE=your_authcode
EMAIL_USERNAME=your_email
EMAIL_PASSWORD=your_password
```

### 2. 添加到 `.gitignore`

```gitignore
.env
config/*.json
config/*.yaml
```

### 3. 加载配置

在 Python 代码中使用：

```python
from dotenv import load_dotenv
import os

load_dotenv()
password = os.getenv("CTP_PASSWORD")
```

