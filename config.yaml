# 量化交易系统配置
# Quant Trading System Configuration
# 版本：1.0.0
# 更新日期：2026-03-25

---

## 交易接口配置

```
CTP:
  name: "CTP"
  type: "CTP"
  product: "CFFEX"  # 股指期货
  variety: "CTP"     # 期货
  # 以下为环境变量，运行时从.env 加载
  # password: "${CTP_PASSWORD}"
  # brokerid: "${CTP_BROKERID}"
  # userid: "${CTP_USERID}"
  # appid: "${CTP_APPID}"
  # authcode: "${CTP_AUTHCODE}"
```

---

## 数据库配置

```
database:
  type: "sqlite"           # sqlite / mysql / postgresql
  path: "./data.db"        # SQLite 路径
  max_connections: 10      # MySQL/PostgreSQL 最大连接数
  pool_size: 5             # 连接池大小
```

---

## 日志配置

```
logging:
  active: true
  level: "INFO"            # DEBUG / INFO / WARNING / ERROR
  console: true
  file:
    enabled: true
    name: "log"
    path: "./logs"
    size: 10485760          # 10MB
    max_files: 10
    rotation: "size"        # size / time
    format: "%Y-%m-%d %H:%M:%S"
    filter_sensitive: true  # 过滤密码等敏感信息
```

---

## 邮件配置（可选）

```
email:
  enabled: false
  server: "smtp.example.com"
  port: 25
  username: "${EMAIL_USERNAME}"
  password: "${EMAIL_PASSWORD}"
  sender: "${EMAIL_SENDER}"
  receiver:
    - "${EMAIL_RECEIVER_1}"
    - "${EMAIL_RECEIVER_2}"
```

